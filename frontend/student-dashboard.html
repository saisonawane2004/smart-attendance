<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard - Smart Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-info">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Student Dashboard</a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>
<div class="container py-4">
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Scan QR to Mark Attendance</div>
                <div class="card-body">
                    <a href="scan-qr.html" class="btn btn-sm btn-primary">Open QR Scanner</a>
                    <p class="small mt-2 text-muted">
                        Your browser will ask for camera and location permissions when scanning.
                    </p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">My Attendance</div>
                <div class="card-body">
                    <button class="btn btn-sm btn-secondary mb-3" onclick="loadMyAttendance()">Refresh</button>
                    <div class="table-responsive">
                        <table class="table table-sm table-striped">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Subject ID</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                            </thead>
                            <tbody id="myAttendanceBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;

    function ensureStudent() {
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user || user.role !== 'STUDENT') {
            window.location.href = 'login.html';
        }
    }

    function logout() {
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    ensureStudent();

    async function loadMyAttendance() {
        const user = JSON.parse(localStorage.getItem('user'));
        // For demo, student ID is 1 for sample data. In a real system, map user to student ID.
        const studentId = 1;
        const tbody = document.getElementById('myAttendanceBody');
        tbody.innerHTML = '';
        const res = await fetch(API_BASE + '/attendance/student/' + studentId);
        if (!res.ok) return;
        const data = await res.json();
        data.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${row.id}</td>
              <td>${row.subject.id}</td>
              <td>${row.date}</td>
              <td>${row.status}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    loadMyAttendance();
</script>
</body>
</html>
