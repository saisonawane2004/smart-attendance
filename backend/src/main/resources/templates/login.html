<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="login-wrap">
    <div class="panel login-card">
        <div class="panel-body p-4 p-md-5">
            <p class="subtitle mb-2">Smart Attendance Platform</p>
            <h1 class="login-title mb-3">Welcome back</h1>
            <p class="helper mb-4">Sign in to continue to your dashboard.</p>

            <div class="alert alert-danger" th:if="${param.error}">Invalid credentials</div>
            <div class="alert alert-success" th:if="${param.logout}">Logged out successfully</div>

            <form method="post" th:action="@{/login}">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input class="form-control" name="username" type="email" placeholder="you@college.edu" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input class="form-control" name="password" type="password" placeholder="Enter your password" required>
                </div>
                <button class="btn btn-primary w-100 py-2">Sign In</button>
            </form>

            <div class="helper mt-4">
                Demo users: admin@smart.com, faculty@smart.com, student@smart.com (password: 1234)
            </div>
        </div>
    </div>
</div>
</body>
</html>
