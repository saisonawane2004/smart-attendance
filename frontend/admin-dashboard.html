<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Smart Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Admin Dashboard</a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>
<div class="container py-4">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Add Student</div>
                <div class="card-body">
                    <form id="studentForm">
                        <input class="form-control mb-2" placeholder="Name" id="sName" required>
                        <input class="form-control mb-2" placeholder="Email" id="sEmail" required>
                        <input class="form-control mb-2" placeholder="Password" id="sPassword" required>
                        <input class="form-control mb-2" placeholder="Roll Number" id="sRoll" required>
                        <button class="btn btn-sm btn-primary w-100">Add Student</button>
                    </form>
                    <div id="sMsg" class="small mt-2"></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Add Faculty</div>
                <div class="card-body">
                    <form id="facultyForm">
                        <input class="form-control mb-2" placeholder="Name" id="fName" required>
                        <input class="form-control mb-2" placeholder="Email" id="fEmail" required>
                        <input class="form-control mb-2" placeholder="Password" id="fPassword" required>
                        <button class="btn btn-sm btn-primary w-100">Add Faculty</button>
                    </form>
                    <div id="fMsg" class="small mt-2"></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Add Subject</div>
                <div class="card-body">
                    <form id="subjectForm">
                        <input class="form-control mb-2" placeholder="Subject Name" id="subName" required>
                        <input class="form-control mb-2" placeholder="Faculty ID" id="subFacultyId" required>
                        <button class="btn btn-sm btn-primary w-100">Add Subject</button>
                    </form>
                    <div id="subMsg" class="small mt-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>All Attendance Records</span>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadAttendance()">Refresh</button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-sm table-striped">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Student ID</th>
                                <th>Subject ID</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Lat</th>
                                <th>Lng</th>
                            </tr>
                            </thead>
                            <tbody id="attendanceBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8081';

    function ensureAdmin() {
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user || user.role !== 'ADMIN') {
            window.location.href = 'login.html';
        }
    }

    function logout() {
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    ensureAdmin();

    document.getElementById('studentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            name: document.getElementById('sName').value,
            email: document.getElementById('sEmail').value,
            password: document.getElementById('sPassword').value,
            rollNumber: document.getElementById('sRoll').value
        };
        const msg = document.getElementById('sMsg');
        msg.textContent = '';
        const res = await fetch(API_BASE + '/admin/add-student', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        msg.textContent = res.ok ? 'Student added' : 'Error adding student';
    });

    document.getElementById('facultyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            name: document.getElementById('fName').value,
            email: document.getElementById('fEmail').value,
            password: document.getElementById('fPassword').value
        };
        const msg = document.getElementById('fMsg');
        msg.textContent = '';
        const res = await fetch(API_BASE + '/admin/add-faculty', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        msg.textContent = res.ok ? 'Faculty added' : 'Error adding faculty';
    });

    document.getElementById('subjectForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            name: document.getElementById('subName').value,
            facultyId: document.getElementById('subFacultyId').value
        };
        const msg = document.getElementById('subMsg');
        msg.textContent = '';
        const res = await fetch(API_BASE + '/admin/add-subject', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        msg.textContent = res.ok ? 'Subject added' : 'Error adding subject';
    });

    async function loadAttendance() {
        const tbody = document.getElementById('attendanceBody');
        tbody.innerHTML = '';
        const res = await fetch(API_BASE + '/admin/attendance');
        if (!res.ok) return;
        const data = await res.json();
        data.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${row.id}</td>
              <td>${row.student.id}</td>
              <td>${row.subject.id}</td>
              <td>${row.date}</td>
              <td>${row.status}</td>
              <td>${row.latitude ?? ''}</td>
              <td>${row.longitude ?? ''}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    loadAttendance();
</script>
</body>
</html>
