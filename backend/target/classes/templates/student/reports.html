<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Reports</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body><div class="page-wrap"><div class="app-shell">
<div class="topbar mb-4"><div><h2 class="brand">Smart Attendance Pro - My Reports</h2><p class="subtitle">Track monthly and yearly attendance with leave insights</p></div><a th:href="@{/student/dashboard}" class="btn btn-outline-secondary">Back</a></div>

<div class="panel mb-4"><div class="panel-body"><form method="get" th:action="@{/student/reports}" class="row g-2 align-items-end"><div class="col-md-3"><label class="form-label">Period</label><select class="form-select" name="periodType"><option value="daily" th:selected="${periodType=='daily'}">Daily</option><option value="monthly" th:selected="${periodType=='monthly'}">Monthly</option><option value="yearly" th:selected="${periodType=='yearly'}">Yearly</option></select></div><div class="col-md-3"><label class="form-label">Date</label><input type="date" name="date" class="form-control" th:value="${selectedDate}"></div><div class="col-md-2"><label class="form-label">Month</label><input class="form-control" type="number" min="1" max="12" name="month" th:value="${selectedMonth}"></div><div class="col-md-2"><label class="form-label">Year</label><input class="form-control" type="number" min="2020" max="2100" name="year" th:value="${selectedYear}"></div><div class="col-md-2 d-flex gap-2"><button class="btn btn-primary flex-fill">Filter</button><a class="btn btn-success flex-fill" th:href="@{/student/reports/csv(periodType=${periodType},date=${selectedDate},month=${selectedMonth},year=${selectedYear})}">CSV</a></div></form></div></div>

<div class="row g-3 mb-4"><div class="col-md-3"><div class="panel p-3"><div class="subtitle">Days Completed</div><div class="h4 mb-0" th:text="${summary.daysCompleted}"></div></div></div><div class="col-md-3"><div class="panel p-3"><div class="subtitle">Present Days</div><div class="h4 mb-0" th:text="${summary.presents}"></div></div></div><div class="col-md-3"><div class="panel p-3"><div class="subtitle">Absent Days</div><div class="h4 mb-0" th:text="${summary.absents}"></div></div></div><div class="col-md-3"><div class="panel p-3"><div class="subtitle">Attendance %</div><div class="h4 mb-0" th:text="${#numbers.formatDecimal(summary.percentage,1,2)} + '%' "></div></div></div></div>

<div class="panel"><div class="panel-body"><div class="table-responsive"><table class="table-modern"><thead><tr><th>Subject</th><th>Time</th><th>Status</th></tr></thead><tbody><tr th:each="r:${rows}"><td th:text="${r.session.subject.name}"></td><td th:text="${r.timestamp}"></td><td><span class="badge-soft-success" th:text="${r.status}"></span></td></tr></tbody></table></div></div></div>
</div></div></body></html>
