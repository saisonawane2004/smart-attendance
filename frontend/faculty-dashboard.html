<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faculty Dashboard - Smart Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Faculty Dashboard</a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>
<div class="container py-4">
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Generate QR Code</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Subject ID</label>
                        <input class="form-control" id="qrSubjectId" placeholder="e.g. 1">
                    </div>
                    <button class="btn btn-sm btn-success mb-3" onclick="generateQr()">Generate QR</button>
                    <div id="qrMsg" class="small mb-2"></div>
                    <img id="qrImage" class="img-fluid border d-none" alt="QR Code">
                    <p class="small mt-2 text-muted">QR codes are valid for 2 minutes.</p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Subject Attendance</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Subject ID</label>
                        <input class="form-control" id="reportSubjectId" placeholder="e.g. 1">
                    </div>
                    <button class="btn btn-sm btn-secondary mb-3" onclick="loadSubjectAttendance()">Load Attendance</button>
                    <div class="table-responsive">
                        <table class="table table-sm table-striped">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Student ID</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                            </thead>
                            <tbody id="subjectAttendanceBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8081';

    function ensureFaculty() {
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user || user.role !== 'FACULTY') {
            window.location.href = 'login.html';
        }
    }

    function logout() {
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    ensureFaculty();

    async function generateQr() {
        const subjectId = document.getElementById('qrSubjectId').value;
        const img = document.getElementById('qrImage');
        const msg = document.getElementById('qrMsg');
        msg.textContent = '';
        img.classList.add('d-none');
        if (!subjectId) {
            msg.textContent = 'Enter subject ID.';
            return;
        }
        try {
            const res = await fetch(API_BASE + '/faculty/generate-qr?subjectId=' + encodeURIComponent(subjectId), {
                method: 'POST'
            });
            if (!res.ok) {
                msg.textContent = 'Failed to generate QR.';
                return;
            }
            const blob = await res.blob();
            img.src = URL.createObjectURL(blob);
            img.classList.remove('d-none');
            msg.textContent = 'QR generated.';
        } catch (e) {
            msg.textContent = 'Error: ' + e;
        }
    }

    async function loadSubjectAttendance() {
        const subjectId = document.getElementById('reportSubjectId').value;
        const tbody = document.getElementById('subjectAttendanceBody');
        tbody.innerHTML = '';
        if (!subjectId) return;
        const res = await fetch(API_BASE + '/faculty/attendance/' + encodeURIComponent(subjectId));
        if (!res.ok) return;
        const data = await res.json();
        data.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${row.id}</td>
              <td>${row.student.id}</td>
              <td>${row.date}</td>
              <td>${row.status}</td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>
</body>
</html>
