<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scan QR - Smart Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Scan QR Code</h4>
        <a href="student-dashboard.html" class="btn btn-sm btn-outline-secondary">Back</a>
    </div>
    <div class="row">
        <div class="col-md-8">
            <div id="qrReader" style="width: 100%;"></div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h6>Scan Status</h6>
                    <div id="status" class="small mb-2"></div>
                    <button class="btn btn-sm btn-primary" onclick="startScanner()">Start Scanner</button>
                    <button class="btn btn-sm btn-secondary" onclick="stopScanner()">Stop Scanner</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8081';
    let html5QrcodeScanner;

    function ensureStudent() {
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user || user.role !== 'STUDENT') {
            window.location.href = 'login.html';
        }
    }

    ensureStudent();

    function setStatus(msg) {
        document.getElementById('status').textContent = msg;
    }

    function startScanner() {
        if (html5QrcodeScanner) {
            return;
        }
        setStatus('Starting camera...');
        html5QrcodeScanner = new Html5Qrcode("qrReader");
        Html5Qrcode.getCameras().then(devices => {
            if (!devices || devices.length === 0) {
                setStatus('No camera found');
                return;
            }
            const cameraId = devices[0].id;
            html5QrcodeScanner.start(
                cameraId,
                {fps: 10, qrbox: 250},
                onScanSuccess
            ).then(() => setStatus('Scanner started. Point camera at QR code.'))
                .catch(err => setStatus('Failed to start scanner: ' + err));
        }).catch(err => setStatus('Camera error: ' + err));
    }

    function stopScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                html5QrcodeScanner.clear();
                html5QrcodeScanner = null;
                setStatus('Scanner stopped.');
            });
        }
    }

    function onScanSuccess(decodedText) {
        stopScanner();
        setStatus('QR scanned, getting location...');
        if (!navigator.geolocation) {
            setStatus('Geolocation not supported by this browser.');
            return;
        }
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            setStatus('Location captured. Sending to server...');
            const user = JSON.parse(localStorage.getItem('user'));
            // For demo mapping, student entity id is 1
            const studentId = 1;
            try {
                const res = await fetch(API_BASE + '/attendance/mark', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        qrToken: decodedText,
                        studentId: String(studentId),
                        latitude: String(lat),
                        longitude: String(lng)
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    setStatus('Attendance marked successfully!');
                } else {
                    setStatus('Failed: ' + (data.message || 'Unknown error'));
                }
            } catch (e) {
                setStatus('Error sending request: ' + e);
            }
        }, (err) => {
            setStatus('Location error: ' + err.message);
        }, {
            enableHighAccuracy: true,
            timeout: 10000
        });
    }
</script>
</body>
</html>
