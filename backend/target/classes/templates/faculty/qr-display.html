<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR Session</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="page-wrap">
    <div class="app-shell">
        <div class="topbar mb-4">
            <div>
                <h2 class="brand">Session QR</h2>
                <p class="subtitle">Share this QR with students in class</p>
            </div>
            <a class="btn btn-outline-secondary" th:href="@{/faculty/dashboard}">Back</a>
        </div>

        <div class="panel">
            <div class="panel-body text-center py-4">
                <div class="row justify-content-center">
                    <div class="col-lg-5">
                        <div class="panel p-4" id="qrSessionCard">
                            <div id="qrActiveContent">
                                <img th:src="${'data:image/png;base64,' + qrBase64}" alt="QR" class="img-fluid rounded-4"/>
                                <div class="mt-3">
                                    <span class="badge text-bg-light">Session ID: <span th:text="${session.id}"></span></span>
                                </div>
                                <div class="mt-2">
                                    <span class="badge text-bg-light">Token: <span th:text="${session.qrToken}"></span></span>
                                </div>
                                <p class="subtitle mt-2">Share this URL with students: <span th:text="${markUrl}"></span></p>
                                <p class="subtitle mt-3 mb-1">Time remaining</p>
                                <div id="countdownText" class="fs-4 fw-bold">01:00</div>
                                <p class="subtitle mt-2 mb-0">Expires at <span th:text="${session.expiryTime}"></span></p>
                            </div>

                            <div id="qrExpiredState" class="d-none">
                                <div class="alert alert-danger mb-0" role="alert">
                                    This QR session has expired. The QR code is no longer available.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    (function () {
        const sessionCard = document.getElementById('qrSessionCard');
        const countdownText = document.getElementById('countdownText');
        const activeContent = document.getElementById('qrActiveContent');
        const expiredState = document.getElementById('qrExpiredState');
        const expiryTimeMs = /*[[${expiryTimeMs}]]*/ 0;

        if (!sessionCard || !countdownText || !activeContent || !expiredState) {
            return;
        }

        if (!expiryTimeMs) {
            countdownText.textContent = 'Unavailable';
            return;
        }

        let timerId = null;

        function formatRemaining(ms) {
            const totalSeconds = Math.max(0, Math.floor(ms / 1000));
            const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            return minutes + ':' + seconds;
        }

        function expireQr() {
            activeContent.classList.add('d-none');
            expiredState.classList.remove('d-none');
        }

        function updateCountdown() {
            const remaining = expiryTimeMs - Date.now();

            if (remaining <= 0) {
                countdownText.textContent = '00:00';
                expireQr();
                if (timerId) {
                    clearInterval(timerId);
                }
                return;
            }

            countdownText.textContent = formatRemaining(remaining);
        }

        updateCountdown();
        timerId = setInterval(updateCountdown, 1000);
    }());
</script>
</body>
</html>
