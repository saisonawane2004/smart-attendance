<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<div class="page-wrap"><div class="app-shell">
    <div class="topbar mb-4">
        <div><h2 class="brand">Admin Console</h2><p class="subtitle">Manage users, classes, and subjects</p></div>
        <form method="post" th:action="@{/logout}"><button class="btn btn-outline-danger">Logout</button></form>
    </div>

    <div class="alert alert-success" th:if="${param.success}" th:text="${param.success}"></div>

    <div class="row grid-gap mb-4">
        <div class="col-lg-3 col-md-6"><div class="panel"><div class="panel-body"><h6 class="mb-3">Add Class</h6><form method="post" th:action="@{/admin/classes}"><input class="form-control mb-2" name="name" placeholder="Class name" required><input class="form-control mb-2" name="section" placeholder="Section" required><select class="form-select mb-3" name="yearLevel" required><option value="1">First Year</option><option value="2">Second Year</option><option value="3">Third Year</option></select><button class="btn btn-primary w-100">Create</button></form></div></div></div>
        <div class="col-lg-3 col-md-6"><div class="panel"><div class="panel-body"><h6 class="mb-3">Add Faculty</h6><form method="post" th:action="@{/admin/faculty}"><input class="form-control mb-2" name="name" placeholder="Full name" required><input class="form-control mb-2" name="email" type="email" placeholder="Email" required><input class="form-control mb-2" name="password" type="password" placeholder="Password" required><input class="form-control mb-3" name="department" placeholder="Department" required><button class="btn btn-primary w-100">Create</button></form></div></div></div>
        <div class="col-lg-3 col-md-6"><div class="panel"><div class="panel-body"><h6 class="mb-3">Add Student</h6><form method="post" th:action="@{/admin/students}"><input class="form-control mb-2" name="name" placeholder="Full name" required><input class="form-control mb-2" name="email" type="email" placeholder="Email" required><input class="form-control mb-2" name="password" type="password" placeholder="Password" required><input class="form-control mb-2" name="rollNumber" placeholder="Roll number" required><select class="form-select mb-3" name="classId" required><option value="">Select class</option><option th:each="c:${allClasses}" th:value="${c.id}" th:text="${c.name+' - '+c.section}"></option></select><button class="btn btn-primary w-100">Create</button></form></div></div></div>
        <div class="col-lg-3 col-md-6"><div class="panel"><div class="panel-body"><h6 class="mb-3">Add Subject</h6><form method="post" th:action="@{/admin/subjects}"><input class="form-control mb-2" name="name" placeholder="Subject name" required><select class="form-select mb-2" name="facultyId" required><option value="">Select faculty</option><option th:each="f:${allFaculty}" th:value="${f.id}" th:text="${f.user.name}"></option></select><select class="form-select mb-3" name="classId" required><option value="">Select class</option><option th:each="c:${allClasses}" th:value="${c.id}" th:text="${c.name+' - '+c.section}"></option></select><button class="btn btn-primary w-100">Create</button></form></div></div></div>
    </div>

    <div class="panel"><div class="panel-head"><h5 class="mb-0">System Snapshot</h5><span class="subtitle">Live data overview</span></div><div class="panel-body">
        <div class="row text-center g-3">
            <div class="col-md-3"><div class="panel p-3"><div class="subtitle">Students</div><div class="h3 mb-0" th:text="${students.totalElements}"></div></div></div>
            <div class="col-md-3"><div class="panel p-3"><div class="subtitle">Faculty</div><div class="h3 mb-0" th:text="${faculty.totalElements}"></div></div></div>
            <div class="col-md-3"><div class="panel p-3"><div class="subtitle">Subjects</div><div class="h3 mb-0" th:text="${subjects.totalElements}"></div></div></div>
            <div class="col-md-3"><div class="panel p-3"><div class="subtitle">Classes</div><div class="h3 mb-0" th:text="${classes.totalElements}"></div></div></div>
        </div>
    </div></div>
</div></div>
</body></html>
