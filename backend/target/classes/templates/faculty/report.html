<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Faculty Report</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body><div class="page-wrap"><div class="app-shell">
<div class="topbar mb-4"><div><h2 class="brand">Smart Attendance Pro - Reports</h2><p class="subtitle">Subject-wise and student-wise attendance intelligence</p></div><a class="btn btn-outline-secondary" th:href="@{/faculty/dashboard}">Back</a></div>

<div class="panel mb-4"><div class="panel-body">
<form method="get" th:action="@{/faculty/attendance/report}" class="row g-2 align-items-end">
<div class="col-md-3"><label class="form-label">Subject</label><select class="form-select" name="subjectId" required><option th:each="s:${subjects}" th:value="${s.id}" th:text="${s.name}" th:selected="${s.id==selectedSubjectId}"></option></select></div>
<div class="col-md-2"><label class="form-label">Period</label><select class="form-select" name="periodType"><option value="daily" th:selected="${periodType=='daily'}">Daily</option><option value="monthly" th:selected="${periodType=='monthly'}">Monthly</option><option value="yearly" th:selected="${periodType=='yearly'}">Yearly</option></select></div>
<div class="col-md-2"><label class="form-label">Date</label><input class="form-control" type="date" name="date" th:value="${selectedDate}"></div>
<div class="col-md-1"><label class="form-label">Month</label><input class="form-control" type="number" min="1" max="12" name="month" th:value="${selectedMonth}"></div>
<div class="col-md-1"><label class="form-label">Year</label><input class="form-control" type="number" min="2020" max="2100" name="year" th:value="${selectedYear}"></div>
<div class="col-md-2"><label class="form-label">Student</label><select class="form-select" name="studentId"><option value="">All</option><option th:each="s:${students}" th:value="${s.id}" th:text="${s.user.name+' ('+s.rollNumber+')'}" th:selected="${selectedStudentId!=null and s.id==selectedStudentId}"></option></select></div>
<div class="col-md-1"><button class="btn btn-primary w-100">Filter</button></div>
</form>
</div></div>

<div class="row g-3 mb-4">
<div class="col-md-3"><div class="panel p-3"><div class="subtitle">Total Sessions</div><div class="h4 mb-0" th:text="${summary.totalSessions}"></div></div></div>
<div class="col-md-3"><div class="panel p-3"><div class="subtitle">Presents</div><div class="h4 mb-0" th:text="${summary.presents}"></div></div></div>
<div class="col-md-3"><div class="panel p-3"><div class="subtitle">Leaves</div><div class="h4 mb-0" th:text="${summary.leaves}"></div></div></div>
<div class="col-md-3"><div class="panel p-3"><div class="subtitle">Attendance %</div><div class="h4 mb-0" th:text="${#numbers.formatDecimal(summary.percentage,1,2)} + '%' "></div></div></div>
</div>

<div class="panel"><div class="panel-body"><div class="table-responsive"><table class="table-modern"><thead><tr><th>Student</th><th>Roll</th><th>Subject</th><th>Timestamp</th><th>Status</th></tr></thead><tbody><tr th:each="a:${attendances}"><td th:text="${a.student.user.name}"></td><td th:text="${a.student.rollNumber}"></td><td th:text="${a.session.subject.name}"></td><td th:text="${a.timestamp}"></td><td><span class="badge-soft-success" th:text="${a.status}"></span></td></tr></tbody></table></div></div></div>
</div></div></body></html>
